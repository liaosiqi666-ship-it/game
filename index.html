<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>规则怪谈支线版 - 文字冒险游戏</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --panel: #111;
            --text: #c8c8c8;
            --accent: #8b0000;
            --accent2: #1a6b3c;
            --gold: #b8860b;
            --border: #2a2a2a;
            --btn-bg: #1a1a1a;
            --btn-hover: #2a2a2a;
            --input-bg: #0d0d0d;
            --dim: #666;
            --danger: #c0392b;
            --safe: #27ae60;
            --warn: #d4a017;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Courier New', 'SimSun', 'STSong', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            user-select: none;
        }

        #game-container {
            width: 100%;
            max-width: 820px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            height: 95vh;
            max-height: 900px;
            box-shadow: 0 0 40px rgba(139, 0, 0, 0.15);
            overflow: hidden;
        }

        #title-bar {
            background: #0d0d0d;
            padding: 12px 18px;
            border-bottom: 1px solid var(--border);
            text-align: center;
            letter-spacing: 2px;
            font-size: 0.95em;
            color: #888;
            flex-shrink: 0;
        }
        #title-bar span {
            color: var(--accent);
            font-weight: bold;
        }

        #status-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 16px;
            padding: 8px 16px;
            background: #0b0b0b;
            border-bottom: 1px solid var(--border);
            font-size: 0.78em;
            color: #999;
            flex-shrink: 0;
            justify-content: center;
        }
        #status-bar .stat {
            white-space: nowrap;
        }
        #status-bar .stat .val {
            color: var(--gold);
            font-weight: bold;
        }
        #status-bar .stat .danger-val {
            color: var(--danger);
            font-weight: bold;
        }

        #output-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px 18px;
            line-height: 1.7;
            font-size: 0.9em;
            scroll-behavior: smooth;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            white-space: pre-wrap;
            word-break: break-all;
        }
        #output-area .dim {
            color: var(--dim);
        }
        #output-area .danger {
            color: var(--danger);
            font-weight: bold;
        }
        #output-area .safe {
            color: var(--safe);
            font-weight: bold;
        }
        #output-area .gold {
            color: var(--gold);
            font-weight: bold;
        }
        #output-area .accent {
            color: #c0392b;
            font-weight: bold;
        }
        #output-area .separator {
            display: block;
            border-top: 1px dashed #2a2a2a;
            margin: 6px 0;
            color: transparent;
        }
        #output-area hr {
            border: none;
            border-top: 1px dashed #333;
            margin: 8px 0;
        }

        #input-area {
            padding: 10px 16px;
            background: #0b0b0b;
            border-top: 1px solid var(--border);
            flex-shrink: 0;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            align-items: center;
            min-height: 50px;
        }
        #input-area button {
            background: var(--btn-bg);
            color: #ccc;
            border: 1px solid #333;
            padding: 7px 14px;
            cursor: pointer;
            border-radius: 4px;
            font-family: inherit;
            font-size: 0.82em;
            transition: all 0.15s;
            white-space: nowrap;
        }
        #input-area button:hover {
            background: var(--btn-hover);
            border-color: #555;
            color: #fff;
        }
        #input-area button:active {
            background: #222;
            border-color: #666;
        }
        #input-area button.btn-danger {
            border-color: #5a1a1a;
            color: #e74c3c;
        }
        #input-area button.btn-danger:hover {
            background: #2a1010;
            border-color: #8b0000;
        }
        #input-area button.btn-safe {
            border-color: #1a4a2a;
            color: #2ecc71;
        }
        #input-area button.btn-safe:hover {
            background: #0a1a10;
            border-color: #1a6b3c;
        }
        #input-area input {
            background: var(--input-bg);
            color: #ddd;
            border: 1px solid #333;
            padding: 7px 10px;
            border-radius: 4px;
            font-family: inherit;
            font-size: 0.82em;
            width: 140px;
            outline: none;
            transition: border 0.2s;
        }
        #input-area input:focus {
            border-color: #666;
        }
        #input-area .prompt-text {
            color: #999;
            font-size: 0.8em;
            margin-right: 4px;
            white-space: nowrap;
        }

        #continue-btn {
            background: #1a1a1a !important;
            border-color: #444 !important;
            color: #aaa !important;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                border-color: #444;
            }
            50% {
                border-color: #777;
            }
        }

        @media (max-width: 600px) {
            #game-container {
                height: 98vh;
                max-height: none;
                border-radius: 0;
            }
            #output-area {
                font-size: 0.78em;
                padding: 10px 12px;
            }
            #input-area button {
                padding: 5px 9px;
                font-size: 0.72em;
            }
            #input-area input {
                width: 100px;
                font-size: 0.72em;
            }
            #status-bar {
                font-size: 0.68em;
                gap: 4px 8px;
            }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="title-bar"><span>■</span> 规则怪谈支线版 <span>■</span> &nbsp;</div>
        <div id="status-bar">
            <span class="stat">📅<span class="val" id="s-time">1天8:00</span></span>
            <span class="stat">⚠<span class="danger-val" id="s-dn">0</span></span>
            <span class="stat">🎒物品:<span class="val" id="s-items">无</span></span>
            <span class="stat">📖章节:<span class="val" id="s-chapter">1</span></span>
            <span class="stat">🏆成就:<span class="val" id="s-ach">0/6</span></span>
        </div>
        <div id="output-area"></div>
        <div id="input-area"></div>
    </div>
    <script>
        // ==================== 游戏引擎 ====================
        const outputArea = document.getElementById('output-area');
        const inputArea = document.getElementById('input-area');
        const sTime = document.getElementById('s-time');
        const sDn = document.getElementById('s-dn');
        const sItems = document.getElementById('s-items');
        const sChapter = document.getElementById('s-chapter');
        const sAch = document.getElementById('s-ach');

        // 全局游戏变量
        let d = 1,
            h = 8,
            mu = 0,
            dn = 0; // 天、时、分、危险值
        let thing = Array(20).fill(0); // 物品
        let rm = Array(20).fill(0); // 任务列表
        let jj = Array(100).fill(0); // 结局达成
        let yj = Array(5).fill(0); // 隐藏结局
        let cj = Array(11).fill(0); // 成就
        let ans = 1; // 解锁章节
        let onece = 0;
        let currentChapter = 1;
        let gameActive = true;
        let pendingResolve = null;
        let jie = 50,
            cheng = 6;
        let jiejv = [0, 16, 24, 32, 48, 48];

        // 结局名
        const jm = {};
        const jmInit = [
            [1, "<坏>作死第一人"],
            [2, "<坏>出口在哪里"],
            [3, "<坏>黑色的死神"],
            [4, "<坏>也许食物有辐射"],
            [5, "<坏>信任并不是万能的"],
            [6, "<坏>密码错误"],
            [7, "<好>一个醒悟的玩家"],
            [8, "<坏>一个成谜的青年"],
            [9, "<坏>死亡的味道"],
            [10, "<好>生还之人"],
            [11, "<坏>车站谜题"],
            [12, "<好>破解"],
            [13, "<坏>不要去探索未知的领域"],
            [14, "<好>拒绝诱惑就是胜利"],
            [15, "<坏>动物还是动物吗"],
            [16, "<坏>不要想着钻空子，也休想去钻程序的空子！"],
            [17, "<坏>你是动物，你不是人"],
            [18, "<坏>不遵守规则者，噶！"],
            [19, "<坏>犀牛的心思难以预料"],
            [20, "<坏>动物是人，人不是动物……吗？"],
            [21, "<好>歪打正着"],
            [22, "<坏>莫名其妙的老虎和奇奇怪怪的动物园"],
            [23, "<坏>礼貌、本性？"],
            [24, "<好>逃出动物园！"],
            [25, "<坏>异常"],
            [26, "<坏>短路"],
            [27, "<坏>打扰"],
            [28, "<坏>饿货"],
            [29, "<坏>加班"],
            [30, "<坏>任务"],
            [31, "<好>假通"],
            [32, "<好>杀神"],
            [33, "<坏>入口不是出口"],
            [34, "<坏>无尽的询问"],
            [35, "<坏>昏迷"],
            [36, "<坏>报仇"],
            [37, "<坏>医院有诡"],
            [38, "<坏>贪婪"],
            [39, "<坏>欺骗"],
            [40, "<坏>坠落"],
            [41, "<好>暴力破解"],
            [42, "<坏>慌不择路"],
            [43, "<好>清醒"],
            [44, "<好>迷信"],
            [45, "<坏>武德不重要"],
            [46, "<坏>电击"],
            [47, "<坏>逃跑失败"],
            [48, "<好>出院"]
        ];
        jmInit.forEach(([k, v]) => jm[k] = v);

        const edp = ["一位玩家在终点转身离去", "辞在结束区", "结束了，一切都结束了", "天下没有不结束的游戏", "游戏长，游戏短，游戏结束没人管",
            "这一次的结束是为了下一次的开始。"
        ];
        const sta = ["博一应该也是一年级", "规则怪谈重在怪不在规则", "冰激凌是冰的为什么有热量？", "听君一席话，如听一席话", "铜密度大，一斤高达五百克", "氦元素无害为什么叫氦？"
        ];

        function zero() {
            jie = 50;
            cheng = 6;
            jiejv = [0, 16, 24, 32, 48, 48];
            dn = 0;
            thing = Array(20).fill(0);
            rm = Array(20).fill(0);
        }

        function updateStatus() {
            sTime.textContent = `${d}天${h}:${String(mu).padStart(2,'0')}`;
            sDn.textContent = dn;
            const itemNames = [];
            const ch1Names = ['门钥匙', '钟表', '信件', '灵魂', '短剑', '手枪', '怪物判定'];
            const ch2Names = ['硬币', '地图', '灰犀牛', '生肉', '香蕉', '食用盐', '休息馆'];
            const ch3Names = ['任务进度', '异常', '关灯', '火灾', '饥饿', '精力', '扳手', '会议'];
            const ch4Names = ['就诊卡', '斧头', '注射器', '符纸', '药水', '?', '?'];
            const allNames = [...ch1Names, ...ch2Names, ...ch3Names, ...ch4Names];
            for (let i = 0; i < 20; i++) {
                if (thing[i]) itemNames.push(allNames[i] || `物品${i}`);
            }
            sItems.textContent = itemNames.length > 0 ? itemNames.join(', ') : '无';
            sChapter.textContent = currentChapter;
            sAch.textContent = `${cj.filter(Boolean).length}/${cheng}`;
        }

        function addTime(t = 30) {
            mu += t;
            if (mu >= 60) { h += Math.floor(mu / 60);
                mu %= 60; }
            if (h >= 24) { d += Math.floor(h / 24);
                h %= 24; }
            updateStatus();
        }

        function scrollBottom() {
            outputArea.scrollTop = outputArea.scrollHeight;
        }

        function op(text) {
            const div = document.createElement('div');
            div.textContent = text;
            outputArea.appendChild(div);
            scrollBottom();
        }

        function opHTML(html) {
            const div = document.createElement('div');
            div.innerHTML = html;
            outputArea.appendChild(div);
            scrollBottom();
        }

        function cl() {
            outputArea.innerHTML = '';
        }

        function pr(text) {
            return new Promise(resolve => {
                let i = 0;
                const div = document.createElement('div');
                outputArea.appendChild(div);
                scrollBottom();

                function typeChar() {
                    if (i < text.length) {
                        div.textContent += text[i];
                        i++;
                        scrollBottom();
                        setTimeout(typeChar, 50 + Math.random() * 40);
                    } else {
                        resolve();
                    }
                }
                typeChar();
            });
        }

        function sleep(ms) {
            return new Promise(r => setTimeout(r, ms));
        }

        async function st() {
            inputArea.innerHTML = '';
            const btn = document.createElement('button');
            btn.textContent = '▶ 继续';
            btn.id = 'continue-btn';
            btn.style.cssText = 'font-size:0.9em;padding:8px 20px;letter-spacing:1px;';
            inputArea.appendChild(btn);
            scrollBottom();
            return new Promise(resolve => {
                btn.onclick = () => {
                    inputArea.innerHTML = '';
                    resolve();
                };
                pendingResolve = resolve;
            });
        }

        async function getChoice(options) {
            // options: array of {text, value} or just strings
            inputArea.innerHTML = '';
            const btns = [];
            options.forEach((opt, i) => {
                const btn = document.createElement('button');
                if (typeof opt === 'string') {
                    btn.textContent = `${i+1}. ${opt}`;
                    btn._value = i + 1;
                } else {
                    btn.textContent = opt.text;
                    btn._value = opt.value;
                }
                btn.onclick = () => {
                    inputArea.innerHTML = '';
                    if (pendingResolve) {
                        pendingResolve(btn._value);
                        pendingResolve = null;
                    }
                };
                inputArea.appendChild(btn);
                btns.push(btn);
            });
            scrollBottom();
            return new Promise(resolve => {
                pendingResolve = resolve;
            });
        }

        async function getInput(promptText = '') {
            inputArea.innerHTML = '';
            if (promptText) {
                const span = document.createElement('span');
                span.className = 'prompt-text';
                span.textContent = promptText;
                inputArea.appendChild(span);
            }
            const inp = document.createElement('input');
            inp.type = 'text';
            inputArea.appendChild(inp);
            const btn = document.createElement('button');
            btn.textContent = '确认';
            inputArea.appendChild(btn);
            inp.focus();
            scrollBottom();
            return new Promise(resolve => {
                const submit = () => {
                    const val = inp.value.trim();
                    if (val !== '') {
                        inputArea.innerHTML = '';
                        resolve(val);
                    }
                };
                btn.onclick = submit;
                inp.onkeydown = e => { if (e.key === 'Enter') submit(); };
                pendingResolve = resolve;
            });
        }

        function randInt(max) { return Math.floor(Math.random() * max); }

        function randRange(min, max) { return min + Math.floor(Math.random() * (max - min + 1)); }

        // ==================== 章节1：层级商场 ====================
        async function level_1() {
            currentChapter = 1;
            updateStatus();
            op('你决定：');
            const choices = ['探索附近', '上楼', '（这是最下面一层了，不能下楼）', '看一下时间', '寻求帮助', '询问楼层'];
            let x = await getChoice(choices);
            while (x < 1 || x > 6) {
                op('输入错误，请重新选择');
                x = await getChoice(choices);
            }
            cl();
            if (x === 1) {
                if (thing[0]) {
                    op('你发现了一个楼梯口，你决定：');
                    op('1.回去');
                    op('2.下去');
                    x = await getChoice(['回去', '下去']);
                    cl();
                    if (x === 1) { return await level_1(); } else { return await level_B(); }
                } else {
                    op('什么都没有');
                    op('我------------------------------------');
                    op('|太暗了，要是有盏灯就好了。          |');
                    op('--------------------------------------');
                    await st();
                    return await level_1();
                }
            } else if (x === 2) {
                addTime(30);
                return await level_2();
            } else if (x === 3) {
                op('这是最下面一层了……');
                await st();
                return await level_1();
            } else if (x === 4) {
                op(`现在是${d}天${h}:${String(mu).padStart(2,'0')}`);
                await st();
                return await level_1();
            } else if (x === 5) {
                if (dn <= 1) {
                    op('你发现了一位蓝色衣服的工作人员');
                    op('你决定：');
                    const ch = ['回去'];
                    if (dn > 2) ch.push('出口在哪里？');
                    x = await getChoice(ch);
                    cl();
                    if (dn <= 2 || x === 1) return await level_1();
                    if (x === 2) {
                        op('工作人员：看来你并不是这里的生物！');
                        op('结局2：出口在哪里？');
                        jj[2] = 1;
                        return;
                    }
                } else if (dn <= 3) {
                    op('你发现了一位红色衣服的工作人员');
                    op('你决定：');
                    const ch = ['回去'];
                    if (dn > 2) ch.push('出口在哪里？');
                    x = await getChoice(ch);
                    cl();
                    if (dn <= 2 || x === 1) return await level_1();
                    if (x === 2) {
                        op('工作人员：我也不知道！');
                        await st();
                        dn++;
                        return await level_1();
                    }
                    return await level_1();
                } else {
                    op('你发现了一位黑色衣服的工作人员');
                    op('你决定：');
                    x = await getChoice(['回去', '出口在哪里？', '这里不是真实的？', '这里是什么地方？']);
                    cl();
                    if (x === 1) return await level_1();
                    op('工作人员向你发起了攻击！');
                    op('你死了');
                    op('结局3：黑色的死神');
                    jj[3] = 1;
                    return;
                }
            } else {
                op('T1');
                await st();
                return await level_1();
            }
        }

        async function level_2() {
            currentChapter = 1;
            updateStatus();
            op('你决定：');
            let x = await getChoice(['探索附近', '上楼', '下楼', '看一下时间', '寻求帮助', '询问楼层']);
            cl();
            if (x === 1) {
                if (Math.random() < 0.2) {
                    op('你发现了一个钟表，上面显示7:20。');
                    op('你意识到时间有问题。');
                    await st();
                    thing[1] = 1;
                    dn++;
                } else {
                    op('你没有发现');
                    await st();
                }
                return await level_2();
            } else if (x === 2) { addTime(30);
                return await level_3(); } else if (x === 3) { addTime(30);
                return await level_1(); } else if (x === 4) {
                op(`现在是${d}天${h}:${String(mu).padStart(2,'0')}`);
                await st();
                return await level_2();
            } else if (x === 5) {
                if (dn <= 1) {
                    op('你发现了一位蓝色衣服的工作人员');
                    const ch = ['回去'];
                    if (dn === 1) ch.push('出口在哪里？');
                    if (thing[1]) ch.push('时间是不是有问题？');
                    x = await getChoice(ch);
                    cl();
                    if (x === 1 || (dn < 1 && x !== 3)) return await level_2();
                    if (dn > 0 && x === 2) { op('工作人员：看来你并不是这里的生物！');
                        op('结局2：出口在哪里？');
                        jj[2] = 1; return; }
                    if (thing[1] && x === 3) { op('工作人员：emm，这个……（你意识到这不是真正的世界。）');
                        await st(); return await level_2(); }
                    return await level_2();
                } else if (dn <= 3) {
                    op('你发现了一位红色衣服的工作人员');
                    const ch = ['回去'];
                    if (dn > 2) ch.push('出口在哪里？');
                    x = await getChoice(ch);
                    cl();
                    if (dn <= 2 || x === 1) return await level_2();
                    if (x === 2) { op('工作人员：我也不知道！');
                        await st();
                        dn++; return await level_2(); }
                    return await level_2();
                } else {
                    op('你发现了一位黑色衣服的工作人员');
                    x = await getChoice(['回去', '出口在哪里？', '这里不是真实的？', '这里是什么地方？']);
                    cl();
                    if (x === 1) return await level_2();
                    op('工作人员向你发起了攻击！你死了');
                    op('结局3：黑色的死神');
                    jj[3] = 1;
                    return;
                }
            } else { op('T2');
                await st(); return await level_2(); }
        }

        async function level_3() {
            currentChapter = 1;
            updateStatus();
            op('这一层很大，你闻到了罐头的味道。');
            let x = await getChoice(['探索附近', '上楼', '下楼', '看一下时间', '寻求帮助', '询问楼层']);
            cl();
            if (x === 1) {
                op('你发现了罐头，你决定：');
                x = await getChoice(['继续探索', '带走一些', '回去']);
                cl();
                if (x === 1) {
                    if (dn >= 3) op('你觉得前面有希望的曙光。');
                    else op('你觉得前面有死亡的气息');
                    x = await getChoice(['继续走', '回去']);
                    cl();
                    if (x === 2) return await level_3();
                    op('你听到了你朋友的声音："快来！我发现了出口！"');
                    const ch = ['跟着朋友去出口', '回去'];
                    if (dn <= 1) ch.push('搜索一下');
                    x = await getChoice(ch);
                    cl();
